<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Register - Explosive Burger</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Roboto', sans-serif;
    }

    .register-container {
      width: 400px;
      max-width: 90vw;
      background: rgba(26, 26, 26, 0.95);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      border: 2px solid #2ed573;
      backdrop-filter: blur(10px);
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .register-container h2 {
      color: #2ed573;
      margin-bottom: 10px;
      font-size: 28px;
      font-weight: 700;
      font-family: 'Montserrat', sans-serif;
    }

    .register-container p {
      color: #999;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .register-container input, .register-container select {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: 2px solid #2ed573;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      font-size: 16px;
      box-sizing: border-box;
      transition: all 0.3s;
    }

    .register-container input::placeholder {
      color: #999;
    }

    .register-container input:focus, .register-container select:focus {
      outline: none;
      border-color: #1e90ff;
      background: rgba(46, 213, 115, 0.1);
      box-shadow: 0 0 15px rgba(46, 213, 115, 0.3);
    }

    .register-btn {
      background: linear-gradient(45deg, #2ed573, #1e90ff);
      color: white;
      width: 100%;
      padding: 15px;
      margin-top: 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      font-size: 16px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(46, 213, 115, 0.3);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .register-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(46, 213, 115, 0.5);
      background: linear-gradient(45deg, #1e90ff, #2ed573);
    }

    .register-btn:active {
      transform: translateY(0);
    }

    .register-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-message {
      background: rgba(255, 71, 87, 0.2);
      color: #ff9599;
      padding: 12px;
      border-radius: 8px;
      margin: 15px 0;
      display: none;
      border-left: 4px solid #ff4757;
      font-size: 14px;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      background: rgba(46, 213, 115, 0.2);
      color: #7dea9f;
      padding: 12px;
      border-radius: 8px;
      margin: 15px 0;
      display: none;
      border-left: 4px solid #2ed573;
      font-size: 14px;
    }

    .success-message.show {
      display: block;
    }

    .login-link {
      color: #2ed573;
      text-decoration: none;
      font-weight: 600;
      margin-top: 20px;
      display: inline-block;
      transition: color 0.3s ease;
    }

    .login-link:hover {
      color: #1e90ff;
    }

    .home-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      display: inline-block;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
      text-decoration: none;
      border-radius: 20px;
      font-weight: 600;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.3);
      font-size: 14px;
    }

    .home-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.2);
    }

    .logo-section {
      margin-bottom: 30px;
    }

    .logo-section .emoji {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .logo-section .brand-name {
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      font-family: 'Montserrat', sans-serif;
      letter-spacing: 2px;
    }

    .loader {
      display: none;
      text-align: center;
      margin-top: 10px;
    }

    .loader.show {
      display: block;
    }

    .spinner {
      border: 3px solid rgba(46, 213, 115, 0.3);
      border-top: 3px solid #2ed573;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

  <a href="index.html" class="home-btn">← Back to Home</a>

  <div class="register-container">

    <div class="logo-section">
      <div class="emoji">🍔</div>
      <div class="brand-name">EXPLOSIVE BURGER</div>
      <p style="color: #2ed573; margin: 5px 0 0; font-size: 12px; letter-spacing: 1px;">ADMIN REGISTER</p>
    </div>

    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>

    <form id="registerForm" onsubmit="handleRegister(event)">
      <input 
        type="text" 
        id="newUser" 
        placeholder="Username" 
        required
        minlength="3"
        autocomplete="username"
      >

      <input 
        type="password" 
        id="newPass" 
        placeholder="Password" 
        required
        minlength="3"
        autocomplete="new-password"
      >

      <input 
        type="password" 
        id="confirmPass" 
        placeholder="Confirm Password" 
        required
        minlength="3"
      >

      <select id="role" required>
        <option value="">Select Role</option>
        <option value="employee">Employee</option>
        <option value="admin">Admin</option>
      </select>

      <button type="submit" class="register-btn" id="registerBtn">
        Create Account
      </button>

      <div class="loader" id="loader">
        <div class="spinner"></div>
      </div>
    </form>

    <p style="margin-top: 20px; color: #999; font-size: 14px;">
      Already have an account? 
      <a href="login.html" class="login-link">Login here</a>
    </p>

  </div>

  <script>
    // ========================================
    // REGISTER HANDLER - Connects to PHP API
    // ========================================

    async function handleRegister(event) {
      event.preventDefault();

      const username = document.getElementById('newUser').value.trim();
      const password = document.getElementById('newPass').value;
      const confirmPass = document.getElementById('confirmPass').value;
      const role = document.getElementById('role').value;
      const errorMsg = document.getElementById('errorMessage');
      const successMsg = document.getElementById('successMessage');
      const registerBtn = document.getElementById('registerBtn');
      const loader = document.getElementById('loader');

      // Reset messages
      errorMsg.classList.remove('show');
      successMsg.classList.remove('show');

      // Validation
      if (!username || !password || !confirmPass || !role) {
        showError('Please fill in all fields');
        return;
      }

      if (username.length < 3) {
        showError('Username must be at least 3 characters');
        return;
      }

      if (password.length < 3) {
        showError('Password must be at least 3 characters');
        return;
      }

      if (password !== confirmPass) {
        showError('Passwords do not match');
        return;
      }

      // Show loader
      loader.classList.add('show');
      registerBtn.disabled = true;

      try {
        // Send register request to PHP API
        const response = await fetch('api/auth/register.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            username: username,
            password: password,
            role: role
          })
        });

        const data = await response.json();

        if (data.success) {
          // Show success message
          showSuccess('Account created successfully! Redirecting to login...');
          
          // Redirect to login after 2 seconds
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        } else {
          showError(data.error || 'Registration failed');
          loader.classList.remove('show');
          registerBtn.disabled = false;
        }
      } catch (error) {
        console.error('Register error:', error);
        showError('Connection error. Please try again.');
        loader.classList.remove('show');
        registerBtn.disabled = false;
      }
    }

    function showError(message) {
      const errorMsg = document.getElementById('errorMessage');
      errorMsg.textContent = message;
      errorMsg.classList.add('show');
    }

    function showSuccess(message) {
      const successMsg = document.getElementById('successMessage');
      successMsg.textContent = message;
      successMsg.classList.add('show');
    }
  </script>

</body>

</html>
