<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="receipt-container">
  <div class="receipt">
    <div class="receipt-header">
      <h1>Explosive Burger</h1>
      <p>Order Receipt</p>
    </div>

    <div class="receipt-body">
      <div class="order-details">
        <h3>Order Items</h3>
        <ul id="checkoutItems"></ul>
        <div class="total-line">
          <strong>Total: ₱<span id="checkoutTotal">0</span></strong>
        </div>
      </div>

      <div class="customer-info">
        <h3>Delivery Information</h3>
        <form id="checkoutForm">
          <input type="text" id="fullName" placeholder="Full Name" required>
          <input type="text" id="address" placeholder="Complete Address" required>
          <input type="tel" id="contact" placeholder="Contact Number" required>

          <h3>Payment Method</h3>
          <select id="paymentMethod" required>
            <option value="">Select Payment</option>
            <option value="cod">Cash on Delivery</option>
            <option value="gcash">GCash</option>
            <option value="card">Credit Card</option>
          </select>

          <div id="cardDetails" style="display:none;">
            <input type="text" placeholder="Card Number" id="cardNumber">
            <input type="text" placeholder="Expiry Date (MM/YY)" id="expiry">
            <input type="text" placeholder="CVV" id="cvv">
          </div>

          <button type="submit" class="order-btn">Place Order</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="js/checkout.js"></script>

</body>
</html>
